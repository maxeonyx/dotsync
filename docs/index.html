<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>dotsync</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(160deg, #eef6ff 0%, #f6fffa 55%, #fff3e8 100%);
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: linear-gradient(160deg, #0f172a 0%, #111827 55%, #1f2937 100%);
        }
      }

      main {
        width: min(44rem, 92vw);
        padding: 2.5rem;
        border-radius: 1rem;
        background: color-mix(in oklab, canvas 86%, transparent);
        border: 1px solid color-mix(in oklab, canvastext 14%, transparent);
        backdrop-filter: blur(10px);
      }

      h1 {
        margin: 0 0 1rem;
        font-size: clamp(2rem, 5vw, 3rem);
      }

      p {
        margin: 0 0 1rem;
        line-height: 1.6;
      }

      a {
        color: inherit;
        text-underline-offset: 0.2em;
      }

      .placeholder {
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>dotsync</h1>
      <p>Agent-first dotfile sync with scope branches and merge cascades.</p>
      <p class="placeholder">More docs and installation details are coming soon.</p>
      <p><a href="https://github.com/maxeonyx/dotsync">View the repository on GitHub</a></p>
    </main>
  </body>
</html>
